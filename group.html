<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Le persone del gruppo — Poteva Piovere">
  <title>Gruppo — Poteva Piovere</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Shrikhand&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ringraziamenti.css">
  <link rel="stylesheet" href="css/group.css?v=7">

  <noscript><style>.group-error { display: block; }</style></noscript>
</head>
<body>

  <!-- NAV -->
  <header class="site-nav site-nav--solid" role="banner">
    <a href="index.html" class="site-nav__logo">POTEVA PIOVERE</a>
    <a href="ringraziamenti.html" class="site-nav__link">I RINGRAZIAMENTI</a>
  </header>

  <!-- BREADCRUMB — built by JS -->
  <nav class="breadcrumb" aria-label="Navigazione" id="breadcrumb"></nav>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <h1 class="page-hero__title" id="group-title"></h1>
    <p class="page-hero__subtitle" id="group-count"></p>
  </div>

  <!-- GROUP DEDICA -->
  <section class="group-text" id="group-text" hidden>
    <div class="group-text__inner" id="group-ackn"></div>
  </section>

  <!-- GROUP CAROUSEL -->
  <section class="group-carousel-section" id="group-carousel-section" hidden aria-label="Foto del gruppo">
    <div class="gcarousel" id="gcarousel">
      <div class="gcarousel__viewport">
        <div class="gcarousel__track" id="gcarousel-track"></div>
      </div>
      <button class="gcarousel__btn gcarousel__btn--prev" id="gcarousel-prev" aria-label="Foto precedente" hidden><img src="img/umbrella_top.png" alt="" class="gcarousel__btn-icon gcarousel__btn-icon--prev"></button>
      <button class="gcarousel__btn gcarousel__btn--next" id="gcarousel-next" aria-label="Foto successiva" hidden><img src="img/umbrella_top.png" alt="" class="gcarousel__btn-icon gcarousel__btn-icon--next"></button>
      <div class="gcarousel__dots" id="gcarousel-dots" aria-hidden="true"></div>
    </div>
  </section>

  <!-- SUBGROUP LIST — shown if group has subgroups -->
  <nav aria-label="Sottogruppi">
    <ul class="groups-list" id="subgroups-list" role="list" hidden></ul>
  </nav>

  <!-- PERSON CARDS — shown if group/subgroup has members -->
  <section class="people-section" aria-label="Persone del gruppo">
    <div class="cards-grid" id="cards-grid" role="list"></div>
  </section>

  <!-- PIN GATE -->
  <section class="pin-gate" id="pin-gate" aria-label="Sezione riservata" hidden>
    <div class="pin-gate__inner">
      <p class="pin-gate__label">Sezione riservata</p>
      <form class="pin-gate__form" id="pin-form" autocomplete="off">
        <input
          type="password"
          class="pin-gate__input"
          id="pin-input"
          placeholder="inserisci il codice"
          maxlength="24"
          autocomplete="new-password"
          aria-label="Codice di accesso"
          spellcheck="false"
        >
        <button type="submit" class="pin-gate__btn" aria-label="Accedi">
          <span id="pin-spinner" hidden class="pin-gate__spinner" aria-hidden="true"></span>
          <span id="pin-arrow" aria-hidden="true">→</span>
        </button>
      </form>
      <p class="pin-gate__error" id="pin-error" role="alert" aria-live="assertive"></p>
    </div>
  </section>

  <!-- PROTECTED CONTENT — revealed after correct PIN -->
  <section class="protected-section" id="protected-section" aria-label="Contenuto riservato" hidden>
    <div class="protected-section__inner" id="protected-content"></div>
  </section>

  <noscript>
    <div class="group-error">Per visualizzare le persone è necessario abilitare JavaScript.</div>
  </noscript>

  <!-- PERSON MODAL -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-name"
    aria-hidden="true"
  >
    <div class="modal" id="modal" role="document">

      <button class="modal__close" id="modal-close" aria-label="Chiudi scheda">
        <span aria-hidden="true">×</span>
      </button>

      <!-- Letterbox carousel -->
      <div class="mcarousel" id="mcarousel" aria-label="Foto">
        <div class="mcarousel__stage" id="mcarousel-stage">
          <div class="mcarousel__track" id="mcarousel-track"></div>
        </div>
        <button class="gcarousel__btn gcarousel__btn--prev" id="mcarousel-prev" aria-label="Foto precedente" hidden><img src="img/umbrella_top.png" alt="" class="gcarousel__btn-icon gcarousel__btn-icon--prev"></button>
        <button class="gcarousel__btn gcarousel__btn--next" id="mcarousel-next" aria-label="Foto successiva" hidden><img src="img/umbrella_top.png" alt="" class="gcarousel__btn-icon gcarousel__btn-icon--next"></button>
        <div class="gcarousel__dots" id="mcarousel-dots" aria-hidden="true"></div>
      </div>

      <div class="modal__body">
        <h2 class="modal__name" id="modal-name"></h2>
        <div class="modal__text" id="modal-text"></div>
      </div>

    </div>
  </div>

  <script src="js/group.js?v=12"></script>
  <button class="back-to-top" id="back-to-top" aria-label="Torna in cima">
  </button>
  <script src="js/ui.js"></script>
</body>
</html>
