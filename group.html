<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Le persone del gruppo — Poteva Piovere">
  <title>Gruppo — Poteva Piovere</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Shrikhand&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/group.css">

  <noscript>
    <style>
      .group-error { display: block; }
    </style>
  </noscript>
</head>
<body>

  <!-- NAV — always solid -->
  <header class="site-nav site-nav--solid" role="banner">
    <a href="index.html" class="site-nav__logo">POTEVA PIOVERE</a>
    <a href="ringraziamenti.html" class="site-nav__link">I RINGRAZIAMENTI</a>
  </header>

  <!-- BREADCRUMB -->
  <nav class="breadcrumb" aria-label="Navigazione">
    <a href="ringraziamenti.html" class="breadcrumb__link">I RINGRAZIAMENTI</a>
    <span class="breadcrumb__sep" aria-hidden="true">/</span>
    <span class="breadcrumb__current" id="breadcrumb-group" aria-current="page"></span>
  </nav>

  <!-- PAGE HERO — title set by JS -->
  <div class="page-hero">
    <h1 class="page-hero__title" id="group-title"></h1>
    <p class="page-hero__subtitle" id="group-count"></p>
  </div>

  <!-- CARDS GRID — populated by group.js -->
  <section class="people-section" aria-label="Persone del gruppo">
    <div class="cards-grid" id="cards-grid" role="list">
      <!-- Generated by group.js -->
    </div>
  </section>

  <noscript>
    <div class="group-error">
      Per visualizzare le persone è necessario abilitare JavaScript.
    </div>
  </noscript>

  <!-- MODAL OVERLAY -->
  <div
    class="modal-overlay"
    id="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-name"
    aria-hidden="true"
  >
    <!-- Click outside modal box closes it -->
    <div class="modal" id="modal" role="document">

      <button class="modal__close" id="modal-close" aria-label="Chiudi scheda">
        <span aria-hidden="true">×</span>
      </button>

      <!-- Image carousel -->
      <div class="carousel" id="carousel" aria-label="Foto">
        <div class="carousel__track-wrap">
          <div class="carousel__track" id="carousel-track"></div>
        </div>
        <button class="carousel__btn carousel__btn--prev" id="carousel-prev" aria-label="Foto precedente" hidden>←</button>
        <button class="carousel__btn carousel__btn--next" id="carousel-next" aria-label="Foto successiva" hidden>→</button>
        <div class="carousel__dots" id="carousel-dots" aria-hidden="true"></div>
      </div>

      <!-- Text content -->
      <div class="modal__body">
        <h2 class="modal__name" id="modal-name"></h2>
        <p class="modal__text" id="modal-text"></p>
      </div>

    </div>
  </div>

  <script src="js/group.js"></script>
</body>
</html>
